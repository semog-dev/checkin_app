name: checkin_app
description: Smart check-in app with geofencing, real-time groups and push notifications.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.5.0

workspace:
  - packages/domain
  - packages/core

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Internal packages
  core:
    path: packages/core
  domain:
    path: packages/domain

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5  # usado com @riverpod nas features

  # Navigation
  go_router: ^14.6.3

  # Domain
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Storage
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  melos: ^7.4.0
  flutter_flavorizr: ^2.2.2
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # custom_lint e riverpod_lint aguardando compatibilidade com analyzer 7.x
  # custom_lint: ^0.8.1
  # riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
