name: checkin_app
description: Smart check-in app with geofencing, real-time groups and push notifications.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.5.0

workspace:
  - packages/domain
  - packages/core

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Internal packages
  core:
    path: packages/core
  domain:
    path: packages/domain

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0  # usado com @riverpod nas features

  # Navigation
  go_router: ^14.6.3

  # Domain
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Storage
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  melos: ^7.4.0
  flutter_flavorizr: ^2.2.2
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  # custom_lint e riverpod_lint aguardando compatibilidade com analyzer 7.x
  # custom_lint: ^0.8.1
  # riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

melos:
  command:
    bootstrap:
      usePubspecOverrides: true
  scripts:
    codegen:
      run: |
        melos exec --depends-on="build_runner" -- \
          dart run build_runner build --delete-conflicting-outputs
      description: Roda build_runner em todos os packages que o possuem
    analyze:
      run: melos exec -- dart analyze --fatal-infos
      description: Análise estática em todos os packages
    analyze:app:
      run: flutter analyze --fatal-warnings
      description: Análise estática no app principal
    test:
      run: melos exec --depends-on="test" -- dart test
      description: Testes unitários em todos os packages
    test:app:
      run: flutter test --coverage --reporter=expanded
      description: Testes do app principal com cobertura
    format:
      run: melos exec -- dart format .
      description: Formata código em todos os packages
    format:check:
      run: melos exec -- dart format --output=none --check .
      description: Verifica formatação em todos os packages
