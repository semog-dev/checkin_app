name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 — Análise estática
  # Roda primeiro, sem precisar de Java/Android SDK.
  # Falha rápida antes de consumir minutos de build.
  # ─────────────────────────────────────────────────────────────
  analyze:
    name: Análise estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap (instalar dependências)
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Verificar formatação
        run: melos run format:check

      - name: Análise estática — packages
        run: melos run analyze

      - name: Análise estática — app
        run: melos run analyze:app

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Testes
  # Roda em paralelo com analyze; ambos devem passar para
  # desbloquear os jobs de build.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap (instalar dependências)
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Testes — packages (dart test)
        run: melos run test

      - name: Testes — package core (flutter test)
        run: melos run test:core

      - name: Testes — app com cobertura
        run: melos run test:app

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 3 — Build de verificação (dev + staging)
  # Garante que os dois ambientes publicáveis compilam.
  # Usa os envs/*.json já commitados — sem segredos necessários.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    needs: [analyze, test]
    strategy:
      fail-fast: false
      matrix:
        flavor: [dev, staging]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap (instalar dependências)
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Build APK — ${{ matrix.flavor }}
        run: |
          flutter build apk \
            --flavor ${{ matrix.flavor }} \
            --dart-define-from-file=envs/${{ matrix.flavor }}.json

  # ─────────────────────────────────────────────────────────────
  # Job 4 — Build prod (somente na branch main)
  # Monta envs/prod.json e local.properties a partir de secrets
  # do repositório. O APK gerado fica disponível como artefato.
  #
  # Secrets necessários no repositório:
  #   PROD_API_BASE_URL        — ex: https://api.checkinapp.com
  #   PROD_WS_URL              — ex: wss://ws.checkinapp.com
  #   PROD_MAPS_API_KEY        — chave Dart (flutter_map)
  #   PROD_MAPS_API_KEY_NATIVE — chave Android nativa (AndroidManifest)
  # ─────────────────────────────────────────────────────────────
  build-prod:
    name: Build prod
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap (instalar dependências)
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Extrair versão do pubspec.yaml
        id: version
        run: |
          VALUE=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "value=v$VALUE" >> "$GITHUB_OUTPUT"

      - name: Gerar envs/prod.json a partir de secrets
        run: |
          cat > envs/prod.json << 'EOF'
          {
            "FLAVOR": "prod",
            "APP_NAME": "CheckIn",
            "API_BASE_URL": "${{ secrets.PROD_API_BASE_URL }}",
            "WS_URL": "${{ secrets.PROD_WS_URL }}",
            "MAPS_API_KEY": "${{ secrets.PROD_MAPS_API_KEY }}",
            "MOCK_LOCATION": "false",
            "SHOW_DEBUG_OVERLAY": "false",
            "USE_LOCAL_NOTIFICATIONS": "false"
          }
          EOF

      - name: Injetar chave nativa no local.properties
        run: |
          echo "MAPS_API_KEY_PROD=${{ secrets.PROD_MAPS_API_KEY_NATIVE }}" \
            >> android/local.properties

      - name: Build APK — prod
        run: |
          flutter build apk \
            --flavor prod \
            --dart-define-from-file=envs/prod.json

      - name: Upload APK prod como artefato
        uses: actions/upload-artifact@v4
        with:
          name: apk-prod-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 5 — GitHub Release (somente na branch main)
  # Cria (ou atualiza) uma release com o APK prod como asset.
  # A tag é a versão do pubspec.yaml — ex: v1.0.0+1.
  # Lembre de bumpar a versão no pubspec.yaml a cada release.
  # ─────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-prod
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download APK prod
        uses: actions/download-artifact@v4
        with:
          name: apk-prod-${{ github.sha }}
          path: dist/

      - name: Renomear APK com versão
        run: |
          mv dist/app-prod-release.apk \
             dist/checkin-${{ needs.build-prod.outputs.version }}.apk

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-prod.outputs.version }}
          name: Release ${{ needs.build-prod.outputs.version }}
          generate_release_notes: true
          files: dist/checkin-${{ needs.build-prod.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
