name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Git Flow:
#   main        → push: build prod + GitHub Release
#   develop     → push: build dev  (integração contínua)
#   release/**  → push: build staging (validação pré-release)
#   hotfix/**   → push: build staging (validação antes do merge em main)
#   feature/**  → push: analyze + test apenas (feedback rápido)
#
#   PRs → develop : analyze + test
#   PRs → main    : analyze + test + build staging
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Steps reutilizáveis via composite (simulado com defaults) ───────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — Análise estática
  # Roda em: todos os pushes e PRs.
  # Falha rápida antes de consumir minutos de build.
  # ───────────────────────────────────────────────────────────────────────────
  analyze:
    name: Análise estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Verificar formatação
        run: melos run format:check

      - name: Análise estática — packages
        run: melos run analyze

      - name: Análise estática — app
        run: melos run analyze:app

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — Testes
  # Roda em: todos os pushes e PRs (em paralelo com analyze).
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Testes — packages
        run: melos run test

      - name: Testes — core
        run: melos run test:core

      - name: Testes — app com cobertura
        run: melos run test:app

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3 — Build dev
  # Roda em: push para develop.
  # Garante que a branch de integração compila o flavor de desenvolvimento.
  # ───────────────────────────────────────────────────────────────────────────
  build-dev:
    name: Build dev
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Build APK — dev
        run: |
          flutter build apk \
            --flavor dev \
            --dart-define-from-file=envs/dev.json

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4 — Build staging
  # Roda em:
  #   • push para release/** (validação durante preparação da release)
  #   • push para hotfix/**  (validação antes do merge em main)
  #   • PRs para main        (gate obrigatório antes de fazer merge)
  # ───────────────────────────────────────────────────────────────────────────
  build-staging:
    name: Build staging
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/hotfix/')) ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Build APK — staging
        run: |
          flutter build apk \
            --flavor staging \
            --dart-define-from-file=envs/staging.json

  # ───────────────────────────────────────────────────────────────────────────
  # Job 5 — Build prod
  # Roda em: push para main.
  # Monta envs/prod.json e local.properties a partir de secrets.
  #
  # Secrets necessários:
  #   PROD_API_BASE_URL        — ex: https://api.checkinapp.com
  #   PROD_WS_URL              — ex: wss://ws.checkinapp.com
  #   PROD_MAPS_API_KEY        — chave Dart (flutter_map)
  #   PROD_MAPS_API_KEY_NATIVE — chave Android nativa (AndroidManifest)
  # ───────────────────────────────────────────────────────────────────────────
  build-prod:
    name: Build prod
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.value }}
      semver: ${{ steps.version.outputs.semver }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ativar Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: melos run codegen

      - name: Calcular versão
        id: version
        run: |
          # semver vem do pubspec.yaml (bump manual a cada release público)
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          # build number = github.run_number (único e crescente)
          BUILD=${{ github.run_number }}
          echo "semver=$SEMVER"            >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"             >> "$GITHUB_OUTPUT"
          echo "value=v${SEMVER}+${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Gerar envs/prod.json a partir de secrets
        run: |
          cat > envs/prod.json << 'EOF'
          {
            "FLAVOR": "prod",
            "APP_NAME": "CheckIn",
            "API_BASE_URL": "${{ secrets.PROD_API_BASE_URL }}",
            "WS_URL": "${{ secrets.PROD_WS_URL }}",
            "MAPS_API_KEY": "${{ secrets.PROD_MAPS_API_KEY }}",
            "MOCK_LOCATION": "false",
            "SHOW_DEBUG_OVERLAY": "false",
            "USE_LOCAL_NOTIFICATIONS": "false"
          }
          EOF

      - name: Injetar chave nativa no local.properties
        run: |
          echo "MAPS_API_KEY_PROD=${{ secrets.PROD_MAPS_API_KEY_NATIVE }}" \
            >> android/local.properties

      - name: Build APK — prod
        run: |
          flutter build apk \
            --flavor prod \
            --dart-define-from-file=envs/prod.json \
            --build-name=${{ steps.version.outputs.semver }} \
            --build-number=${{ steps.version.outputs.build }}

      - name: Upload APK prod como artefato
        uses: actions/upload-artifact@v4
        with:
          name: apk-prod-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Job 6 — GitHub Release
  # Roda em: push para main (depois de build-prod).
  # Tag = v{semver}+{run_number}  ex: v1.0.0+42
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download APK prod
        uses: actions/download-artifact@v4
        with:
          name: apk-prod-${{ github.sha }}
          path: dist/

      - name: Renomear APK com versão
        run: |
          mv dist/app-prod-release.apk \
             dist/checkin-${{ needs.build-prod.outputs.version }}.apk

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-prod.outputs.version }}
          name: Release ${{ needs.build-prod.outputs.version }}
          generate_release_notes: true
          files: dist/checkin-${{ needs.build-prod.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
